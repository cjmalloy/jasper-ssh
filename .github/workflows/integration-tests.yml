name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Docker Compose tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          docker compose -f compose.test.yml up --build --wait \
            keygen http-backend config-tester target-server target-server-drain
          docker compose -f compose.test.yml run --rm --no-deps test-runner 2>&1 | tee test-results.log

      - name: Clean up Docker Compose
        if: always()
        run: docker compose -f compose.test.yml down -v

      - name: Publish test summary
        if: always()
        uses: actions/github-script@v9
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        with:
          script: |
            const fs = require('fs');
            const passed = process.env.TEST_OUTCOME === 'success';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';
            const summaryStart = '=== TEST SUMMARY START ===';
            const summaryEnd = '=== TEST SUMMARY END ===';
            const log = fs.existsSync('test-results.log')
              ? fs.readFileSync('test-results.log', 'utf8')
                  .split('\n')
                  .map(line => line.replace(/^.*?\|\s?/, ''))
                  .map(line => line.replace(/[\u001b\uFFFD]\[[0-9;?]*[ -/]*[@-~]/g, ''))
                  .join('\n')
              : 'No test output was produced.';
            const summaryStartIndex = log.lastIndexOf(summaryStart);
            const summaryEndIndex = log.indexOf(summaryEnd, summaryStartIndex + summaryStart.length);
            const testSummary = summaryStartIndex >= 0 && summaryEndIndex >= 0
              ? log.slice(summaryStartIndex + summaryStart.length, summaryEndIndex).trim()
              : 'No test summary was produced.';
            const summary = `## ${icon} Docker Compose integration tests ${status}\n\n${testSummary}\n\n<details><summary>Test output</summary>\n\n\`\`\`text\n${log}\n\`\`\`\n</details>`;

            await core.summary.addRaw(summary).write();
            fs.writeFileSync('test-summary.md', summary);

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- docker-compose-integration-results -->';
            const summary = fs.existsSync('test-summary.md')
              ? fs.readFileSync('test-summary.md', 'utf8')
              : '❌ Docker Compose integration test summary was not generated.';
            const body = `${marker}\n${summary}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on test failure
        if: steps.tests.outcome != 'success'
        run: exit 1
