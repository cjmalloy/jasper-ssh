name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        with:
          configurationFile: renovate.json
          # Prefer a PAT with workflow scope for github-actions updates, but fall back to GITHUB_TOKEN.
          token: ${{ secrets.RENOVATE_TOKEN || github.token }}
