name: Controller Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: controller/go.mod
          cache: true
      - name: Test
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          go test -v ./... 2>&1 | tee test-results.log
        working-directory: controller
      - name: Vet
        run: go vet ./...
        working-directory: controller
      - name: Build
        run: go build ./...
        working-directory: controller
      - name: Publish test summary
        if: always()
        uses: actions/github-script@v9
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        with:
          script: |
            const fs = require('fs');
            const passed = process.env.TEST_OUTCOME === 'success';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';
            const output = fs.existsSync('controller/test-results.log')
              ? fs.readFileSync('controller/test-results.log', 'utf8')
              : 'No test output was produced.';
            const tests = [...output.matchAll(/^--- (PASS|FAIL): (\S+) \(([^)]+)\)$/gm)];
            const passedCount = tests.filter(([, result]) => result === 'PASS').length;
            const failedCount = tests.filter(([, result]) => result === 'FAIL').length;
            const results = tests.length
              ? [
                  `**${tests.length} tests** · ${passedCount} passed · ${failedCount} failed`,
                  '| Test | Result | Duration |',
                  '| --- | --- | ---: |',
                  ...tests.map(([, result, name, duration]) =>
                    `| \`${name}\` | ${result === 'PASS' ? '✅ Passed' : '❌ Failed'} | ${duration} |`
                  ),
                ].join('\n')
              : 'No individual test results were found.';
            const summary = [
              `## ${icon} Controller tests ${status}`,
              results,
              `<details><summary>Controller test output</summary>\n\n\`\`\`text\n${output}\n\`\`\`\n</details>`,
            ].join('\n\n');

            await core.summary.addRaw(summary).write();
            fs.writeFileSync('controller-test-summary.md', summary);

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- controller-test-results -->';
            const summary = fs.existsSync('controller-test-summary.md')
              ? fs.readFileSync('controller-test-summary.md', 'utf8')
              : '❌ Controller test summary was not generated.';
            const body = `${marker}\n${summary}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on test failure
        if: steps.tests.outcome != 'success'
        run: exit 1
