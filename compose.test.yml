services:
  keygen:
    build:
      context: .
      dockerfile: tests/Dockerfile
    volumes:
      - ssh-config:/workspace/ssh_config
    entrypoint: ["/bin/bash", "/workspace/tests/init_keys.sh"]
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/ssh_config/ready"]
      interval: 1s
      timeout: 1s
      retries: 10

  http-backend:
    image: python:3.14-alpine
    command: ["python3", "/tests/http_backend.py"]
    volumes:
      - ./tests:/tests:ro

  config-tester:
    build: .
    entrypoint: ["/bin/sh", "/tests/test_missing_config.sh"]
    volumes:
      - ./tests:/tests:ro
      - ssh-config:/keys:ro
      - test-state:/test-state
    depends_on:
      keygen:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/test-state/config-tested"]
      interval: 1s
      timeout: 1s
      retries: 10

  target-server:
    build: .
    restart: unless-stopped
    environment:
      CONFIG_CHANGE_MODE: drain
      LOCAL_ORIGIN: "@test-origin"
      READ_ACCESS: test-read
      TAG_READ_ACCESS: test-tag-read
      TAG_WRITE_ACCESS: test-tag-write
      TOKEN: test-token
      UPSTREAM: http://http-backend:8080/
      USER_ROLE: test-role
      WRITE_ACCESS: test-write
    volumes:
      - ssh-config:/config
      - ssh-config:/secrets:ro
      - test-state:/test-state
    depends_on:
      keygen:
        condition: service_healthy
      http-backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "/healthcheck.sh || { touch /test-state/unhealthy; exit 1; }"]
      interval: 1s
      timeout: 5s
      retries: 20

  target-server-restart:
    build: .
    environment:
      LOCAL_ORIGIN: "@test-origin"
      READ_ACCESS: test-read
      TAG_READ_ACCESS: test-tag-read
      TAG_WRITE_ACCESS: test-tag-write
      TOKEN: test-token
      UPSTREAM: http://http-backend:8080/
      USER_ROLE: test-role
      WRITE_ACCESS: test-write
    volumes:
      - ssh-config:/config
      - ssh-config:/secrets:ro
      - test-state:/test-state
    depends_on:
      keygen:
        condition: service_healthy
      http-backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "/healthcheck.sh || { touch /test-state/restart-unhealthy; exit 1; }"]
      interval: 1s
      timeout: 5s
      retries: 20

  test-runner:
    build:
      context: .
      dockerfile: tests/Dockerfile
    volumes:
      - ssh-config:/workspace/ssh_config
      - test-state:/workspace/test_state
    depends_on:
      config-tester:
        condition: service_healthy
      target-server:
        condition: service_healthy
      target-server-restart:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/workspace/tests/run_tests.sh"]

volumes:
  ssh-config:
  test-state:
